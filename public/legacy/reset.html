<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Exam Tracker 更新缓存</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fb;
        color: #111827;
        font-family: "HarmonyOS Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      main {
        width: min(420px, calc(100% - 32px));
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
        padding: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在更新 Exam Tracker</h1>
      <p id="status">正在清理旧页面缓存，完成后会自动进入新版首页。</p>
    </main>
    <script>
      async function resetAppCache() {
        const status = document.querySelector("#status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          status.textContent = "缓存已清理，正在打开新版首页。";
          location.replace("./?v=reset-57bc308");
        } catch (error) {
          status.textContent = "自动清理失败，请在浏览器设置中清除本站缓存后重新打开。";
        }
      }

      resetAppCache();
    </script>
  </body>
</html>
